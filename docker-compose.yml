version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: postgres

    env_file:
      - .env

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d

    ports:
      - "5432:5432"

  backend:

    build:
      context: ./backend

    container_name: backend

    env_file:
      - .env

    depends_on:
      - postgres

    ports:
      - "8000:8000"

volumes:

  postgres-data:
